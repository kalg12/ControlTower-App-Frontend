<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Control Tower - Admin dashboard for POS system management, client support, and business operations" />
    <meta name="theme-color" content="#6366f1" />
    <title>Control Tower — Admin Panel</title>
    <!-- Apply dark class before Vue loads to prevent flash of unstyled content -->
    <script>
      ;(function () {
        try {
          var s = localStorage.getItem('vueuse-color-scheme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (s === 'dark' || (s !== 'light' && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <style>
      html { background: #ffffff }
      html.dark { background: #0a0a0a }
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
